name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up toolchain
        uses: jdx/mise-action@v2

      - name: Install TypeScript dependencies
        run: make ts-install

      - name: Run TypeScript quality gate
        run: make check-ts

  elixir:
    name: Elixir
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up toolchain
        uses: jdx/mise-action@v2

      - name: Cache Mix dependencies and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            orchestrator/elixir/deps
            orchestrator/elixir/_build
          key: mix-${{ runner.os }}-${{ hashFiles('orchestrator/elixir/mix.lock') }}

      - name: Cache Dialyzer PLTs
        uses: actions/cache@v4
        with:
          path: orchestrator/elixir/priv/plts
          key: dialyzer-${{ runner.os }}-${{ hashFiles('orchestrator/elixir/mix.lock') }}

      - name: Install Elixir dependencies
        run: make elixir-install

      - name: Run Elixir quality gate
        run: make check-elixir
